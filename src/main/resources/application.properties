# Application
spring.application.name=taskmanager

# H2 Database configuration
#spring.datasource.url=jdbc:h2:mem:taskdb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=password

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/taskdb
spring.datasource.username=taskuser
spring.datasource.password=1234
# Spring Boot can infer this from the URL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration for PostgreSQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA configuration for H2
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console



# Actuator configuration
management.endpoints.web.exposure.include=health,info,metrics,env,logger,beans,mappings
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always

management.info.env.enabled=true

# Application info
info.app.description=A task management application built with Spring Boot.
info.app.version=1.0.0
info.app.author=Hugo Lomba

# Custom app properties
app.name=Task Manager
app.version=1.0.0
app.max-tasks-per-page=10

# Logging
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration